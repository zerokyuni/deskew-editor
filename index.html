<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useLayoutEffect } = React;

        // --- [핵심 수학 알고리즘] ---
        function solveGaussian(A, b) {
            const n = b.length;
            for (let i = 0; i < n; i++) {
                let maxEl = Math.abs(A[i][i]), maxRow = i;
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > maxEl) {
                        maxEl = Math.abs(A[k][i]);
                        maxRow = k;
                    }
                }
                [A[maxRow], A[i]] = [A[i], A[maxRow]];
                [b[maxRow], b[i]] = [b[i], b[maxRow]];

                for (let k = i + 1; k < n; k++) {
                    let c = -A[k][i] / A[i][i];
                    for (let j = i; j < n; j++) {
                        if (i === j) A[k][j] = 0;
                        else A[k][j] += c * A[i][j];
                    }
                    b[k] += c * b[i];
                }
            }
            let x = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                x[i] = b[i] / A[i][i];
                for (let k = i - 1; k >= 0; k--) b[k] -= A[k][i] * x[i];
            }
            return x;
        }

        function getHomography(src, dst) {
            let A = [], b = [];
            for (let i = 0; i < 4; i++) {
                let x = src[i].x, y = src[i].y;
                let u = dst[i].x, v = dst[i].y;
                A.push([x, y, 1, 0, 0, 0, -u*x, -u*y]); b.push(u);
                A.push([0, 0, 0, x, y, 1, -v*x, -v*y]); b.push(v);
            }
            let h = solveGaussian(A, b);
            return [ h[0], h[3], h[6], h[1], h[4], h[7], h[2], h[5], 1.0 ];
        }

        // --- [WebGL 렌더러] ---
        class WebGLWarper {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
                this.texture = this.gl.createTexture();
                this.initShaders();
            }

            initShaders() {
                const gl = this.gl;
                const vsSource = `
                    attribute vec2 a_position;
                    varying vec2 v_dstUV;
                    void main() {
                        v_dstUV = vec2(a_position.x * 0.5 + 0.5, -a_position.y * 0.5 + 0.5);
                        gl_Position = vec4(a_position, 0, 1);
                    }
                `;
                const fsSource = `
                    precision highp float;
                    varying vec2 v_dstUV;
                    uniform sampler2D u_image;
                    uniform mat3 u_H;
                    uniform bool u_showGrid;
                    uniform float u_gridSize;

                    // 색상 보정 유니폼
                    uniform float u_brightness;
                    uniform float u_contrast;
                    uniform float u_saturation;

                    vec3 adjustColor(vec3 color) {
                        // 1. 밝기 (Brightness)
                        color += u_brightness;
                        // 2. 대비 (Contrast)
                        color = (color - 0.5) * u_contrast + 0.5;
                        // 3. 채도 (Saturation)
                        float luminance = dot(color, vec3(0.299, 0.587, 0.114));
                        color = mix(vec3(luminance), color, u_saturation);
                        
                        // 범위 클램핑
                        return clamp(color, 0.0, 1.0);
                    }

                    void main() {
                        vec3 srcP = u_H * vec3(v_dstUV, 1.0);
                        vec2 srcUV = srcP.xy / srcP.z;
                        vec4 color;

                        if (srcUV.x < 0.0 || srcUV.x > 1.0 || srcUV.y < 0.0 || srcUV.y > 1.0) {
                            color = vec4(0.0, 0.0, 0.0, 0.0);
                        } else {
                            vec4 texColor = texture2D(u_image, srcUV);
                            // 색상 보정 적용
                            texColor.rgb = adjustColor(texColor.rgb);
                            color = vec4(texColor.rgb, texColor.a);
                        }

                        if (u_showGrid) {
                            float thickness = 0.005; 
                            float gridX = mod(v_dstUV.x, u_gridSize);
                            float gridY = mod(v_dstUV.y, u_gridSize);
                            if (gridX < thickness || gridY < thickness) {
                                color = mix(color, vec4(1.0, 1.0, 1.0, 1.0), 0.3);
                            }
                        }
                        gl_FragColor = color;
                    }
                `;
                const compile = (type, src) => {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, src);
                    gl.compileShader(shader);
                    return shader;
                };
                const program = gl.createProgram();
                gl.attachShader(program, compile(gl.VERTEX_SHADER, vsSource));
                gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fsSource));
                gl.linkProgram(program);
                gl.useProgram(program);

                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,  1,-1,  -1,1,  1,1]), gl.STATIC_DRAW);
                
                const posLocation = gl.getAttribLocation(program, 'a_position');
                gl.enableVertexAttribArray(posLocation);
                gl.vertexAttribPointer(posLocation, 2, gl.FLOAT, false, 0, 0);

                this.program = program;
                this.uMatrixLocation = gl.getUniformLocation(program, 'u_H');
                this.uShowGridLocation = gl.getUniformLocation(program, 'u_showGrid');
                this.uGridSizeLocation = gl.getUniformLocation(program, 'u_gridSize');
                
                // 컬러 유니폼 위치 초기화
                this.uBrightnessLocation = gl.getUniformLocation(program, 'u_brightness');
                this.uContrastLocation = gl.getUniformLocation(program, 'u_contrast');
                this.uSaturationLocation = gl.getUniformLocation(program, 'u_saturation');
            }

            setTexture(imageObj) {
                const gl = this.gl;
                gl.bindTexture(gl.TEXTURE_2D, this.texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imageObj);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }

            setGrid(showGrid, gridSize) {
                const gl = this.gl;
                gl.uniform1i(this.uShowGridLocation, showGrid ? 1 : 0);
                gl.uniform1f(this.uGridSizeLocation, gridSize);
            }

            setColor(brightness, contrast, saturation) {
                const gl = this.gl;
                gl.uniform1f(this.uBrightnessLocation, brightness);
                gl.uniform1f(this.uContrastLocation, contrast);
                gl.uniform1f(this.uSaturationLocation, saturation);
            }

            draw(points) {
                const gl = this.gl;
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                const rectPoints = [ {x:0, y:0}, {x:1, y:0}, {x:1, y:1}, {x:0, y:1} ];
                const matrix = getHomography(rectPoints, points);
                gl.uniformMatrix3fv(this.uMatrixLocation, false, matrix);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            }
        }

        // --- [SVG 아이콘 컴포넌트들] ---
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconArchive = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" x2="14" y1="12" y2="12"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconGrid = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>;
        const IconSliders = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>;
        const IconZoomIn = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>;
        const IconLocate = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="22" y2="12"></line><line x1="12" y1="2" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="22"></line><circle cx="12" cy="12" r="7"></circle></svg>;

        // --- [재사용 가능한 색상 조절 패널 컴포넌트 (성능을 위해 밖으로 분리)] ---
        const ColorAdjustmentPanel = ({ activeImage, handleColorChange }) => {
            if (!activeImage) return <div className="text-xs text-slate-500 text-center py-4">이미지를 선택하세요.</div>;
            return (
                <div className="flex flex-col gap-5">
                    <div className="flex flex-col gap-1.5">
                        <div className="flex justify-between text-xs text-slate-400">
                            <span>밝기 (Brightness)</span>
                            <span className="w-8 text-right font-mono">{Math.round(activeImage.color.brightness * 100)}</span>
                        </div>
                        <input type="range" min="-1" max="1" step="0.05" value={activeImage.color.brightness} onChange={(e) => handleColorChange('brightness', e.target.value)} />
                    </div>
                    <div className="flex flex-col gap-1.5">
                        <div className="flex justify-between text-xs text-slate-400">
                            <span>대비 (Contrast)</span>
                            <span className="w-8 text-right font-mono">{Math.round(activeImage.color.contrast * 100)}</span>
                        </div>
                        <input type="range" min="0" max="2" step="0.05" value={activeImage.color.contrast} onChange={(e) => handleColorChange('contrast', e.target.value)} />
                    </div>
                    <div className="flex flex-col gap-1.5">
                        <div className="flex justify-between text-xs text-slate-400">
                            <span>채도 (Saturation)</span>
                            <span className="w-8 text-right font-mono">{Math.round(activeImage.color.saturation * 100)}</span>
                        </div>
                        <input type="range" min="0" max="2" step="0.05" value={activeImage.color.saturation} onChange={(e) => handleColorChange('saturation', e.target.value)} />
                    </div>
                    <button onClick={() => {
                        handleColorChange('brightness', 0);
                        handleColorChange('contrast', 1);
                        handleColorChange('saturation', 1);
                    }} className="mt-1 w-full py-2 text-xs bg-slate-800 hover:bg-slate-700 text-white rounded transition-colors font-medium">값 초기화</button>
                </div>
            );
        };

        // --- [React 메인 어플리케이션] ---
        const App = () => {
            const [images, setImages] = useState([]);
            const [activeIndex, setActiveIndex] = useState(0);
            
            // 모바일 탭 상태 ('edit' or 'preview')
            const [mobileTab, setMobileTab] = useState('edit');
            // 모바일 전용 색상 툴바 시트 가시성
            const [showMobileColorPanel, setShowMobileColorPanel] = useState(false);

            // 드래그 조작 관련 State
            const [draggingPoint, setDraggingPoint] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            
            // 편집영역 & 미리보기영역 줌
            const [zoomLevel, setZoomLevel] = useState(1);
            const [previewZoomLevel, setPreviewZoomLevel] = useState(1);
            
            // --- [새로 추가된 기능 State] ---
            const [showLoupe, setShowLoupe] = useState(true); // 돋보기 켜기/끄기
            
            const [editPan, setEditPan] = useState({ x: 0, y: 0 }); // 작업창 패닝 위치
            const [isEditPanning, setIsEditPanning] = useState(false);
            const [editPanStart, setEditPanStart] = useState({ x: 0, y: 0 });
            
            const [previewPan, setPreviewPan] = useState({ x: 0, y: 0 }); // 미리보기 패닝 위치
            const [isPreviewPanning, setIsPreviewPanning] = useState(false);
            const [previewPanStart, setPreviewPanStart] = useState({ x: 0, y: 0 });
            
            const [isDragOver, setIsDragOver] = useState(false); // 드래그 앤 드롭 상태
            const dragCounter = useRef(0);
            // ----------------------------------

            const imageContainerRef = useRef(null);
            const imageRef = useRef(null);
            const previewCanvasRef = useRef(null);
            const previewWarperRef = useRef(null);
            
            const [isExporting, setIsExporting] = useState(false);
            const [showGrid, setShowGrid] = useState(true);
            const [gridSize, setGridSize] = useState(0.1); 

            // 컨테이너와 실제 이미지의 좌표 정보 상태
            const [layoutRects, setLayoutRects] = useState({ container: null, image: null });

            const activeImage = images[activeIndex];

            // 파일 처리기
            const handleFiles = (fileList) => {
                Array.from(fileList).forEach((file, index) => {
                    if (!file.type.startsWith('image/')) return;
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => {
                        setImages(prev => [...prev, {
                            id: Math.random().toString(36).substring(2, 9),
                            file, url, imageObj: img,
                            points: [
                                {x: 0.1, y: 0.1}, {x: 0.9, y: 0.1}, 
                                {x: 0.9, y: 0.9}, {x: 0.1, y: 0.9}
                            ],
                            // 초기 색상 보정 상태 추가
                            color: { brightness: 0, contrast: 1, saturation: 1 }
                        }]);
                    };
                    img.src = url;
                });
            };

            const handleDragEnter = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter.current += 1;
                if (dragCounter.current === 1) setIsDragOver(true);
            };
            const handleDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dragCounter.current -= 1;
                if (dragCounter.current === 0) setIsDragOver(false);
            };
            const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); };
            const handleDrop = (e) => { 
                e.preventDefault(); 
                e.stopPropagation();
                dragCounter.current = 0;
                setIsDragOver(false); 
                handleFiles(e.dataTransfer.files); 
            };

            const resetEditView = () => {
                setZoomLevel(1);
                setEditPan({ x: 0, y: 0 });
            };

            const resetPreviewView = () => {
                setPreviewZoomLevel(1);
                setPreviewPan({ x: 0, y: 0 });
            };

            // 이미지 변경 시 줌과 패닝 상태 초기화
            useEffect(() => {
                resetEditView();
                resetPreviewView();
            }, [activeIndex]);

            // 색상 보정 핸들러
            const handleColorChange = (type, value) => {
                setImages(prev => {
                    const newImages = [...prev];
                    newImages[activeIndex] = {
                        ...newImages[activeIndex],
                        color: { ...newImages[activeIndex].color, [type]: parseFloat(value) }
                    };
                    return newImages;
                });
            };

            // 이미지나 줌 레벨이 변경될 때 레이아웃 정보 업데이트
            useLayoutEffect(() => {
                if (imageContainerRef.current && imageRef.current) {
                    setLayoutRects({
                        container: imageContainerRef.current.getBoundingClientRect(),
                        image: imageRef.current.getBoundingClientRect()
                    });
                }
            }, [activeImage, zoomLevel]);

            // 점 드래그 핸들러
            const handlePointerDown = (e, idx) => {
                e.stopPropagation(); // 점 드래그 시 배경 패닝이 동작하지 않도록 방지
                e.target.setPointerCapture(e.pointerId);
                setDraggingPoint(idx);
                setMousePos({ x: e.clientX, y: e.clientY });
            };

            const handlePointerMove = (e) => {
                if (draggingPoint === null || !imageRef.current) return;
                setMousePos({ x: e.clientX, y: e.clientY });
                
                const rect = imageRef.current.getBoundingClientRect();
                const nx = (e.clientX - rect.left) / rect.width;
                const ny = (e.clientY - rect.top) / rect.height;

                setImages(prev => {
                    const newImages = [...prev];
                    const active = { ...newImages[activeIndex] };
                    const newPoints = [...active.points];
                    newPoints[draggingPoint] = { x: nx, y: ny };
                    active.points = newPoints;
                    newImages[activeIndex] = active;
                    return newImages;
                });
            };

            const handlePointerUp = (e) => {
                if (draggingPoint !== null) {
                    e.target.releasePointerCapture(e.pointerId);
                    setDraggingPoint(null);
                }
            };

            // --- [작업창 화면 드래그 (손 툴) 핸들러] ---
            const handleEditPanDown = (e) => {
                setIsEditPanning(true);
                setEditPanStart({ x: e.clientX - editPan.x, y: e.clientY - editPan.y });
                e.currentTarget.setPointerCapture(e.pointerId);
            };
            const handleEditPanMove = (e) => {
                if (!isEditPanning) return;
                setEditPan({ x: e.clientX - editPanStart.x, y: e.clientY - editPanStart.y });
            };
            const handleEditPanUp = (e) => {
                setIsEditPanning(false);
                e.currentTarget.releasePointerCapture(e.pointerId);
            };

            // --- [미리보기 화면 드래그 (손 툴) 핸들러] ---
            const handlePreviewPanDown = (e) => {
                setIsPreviewPanning(true);
                setPreviewPanStart({ x: e.clientX - previewPan.x, y: e.clientY - previewPan.y });
                e.currentTarget.setPointerCapture(e.pointerId);
            };
            const handlePreviewPanMove = (e) => {
                if (!isPreviewPanning) return;
                setPreviewPan({ x: e.clientX - previewPanStart.x, y: e.clientY - previewPanStart.y });
            };
            const handlePreviewPanUp = (e) => {
                setIsPreviewPanning(false);
                e.currentTarget.releasePointerCapture(e.pointerId);
            };

            // --- [마우스 휠 줌 핸들러] ---
            const handleEditWheel = (e) => {
                setZoomLevel(prev => Math.max(0.5, Math.min(10, prev - e.deltaY * 0.002)));
            };
            const handlePreviewWheel = (e) => {
                setPreviewZoomLevel(prev => Math.max(1, Math.min(10, prev - e.deltaY * 0.002)));
            };

            // 실시간 미리보기 WebGL 업데이트
            useEffect(() => {
                if (!previewCanvasRef.current || !activeImage) return;
                if (!previewWarperRef.current) {
                    previewWarperRef.current = new WebGLWarper(previewCanvasRef.current);
                }
                const warper = previewWarperRef.current;
                
                // 텍스처 및 격자 적용
                warper.setTexture(activeImage.imageObj);
                warper.setGrid(showGrid, gridSize);
                
                // 색상 보정 적용
                const c = activeImage.color || { brightness: 0, contrast: 1, saturation: 1 };
                warper.setColor(c.brightness, c.contrast, c.saturation);

                const pts = activeImage.points;
                const w1 = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                const w2 = Math.hypot(pts[3].x - pts[2].x, pts[3].y - pts[3].y);
                const h1 = Math.hypot(pts[0].x - pts[3].x, pts[0].y - pts[3].y);
                const h2 = Math.hypot(pts[1].x - pts[2].x, pts[1].y - pts[2].y);
                
                const outW = Math.max(w1, w2) * activeImage.imageObj.width;
                const outH = Math.max(h1, h2) * activeImage.imageObj.height;
                
                const maxDim = 800; // 해상도 살짝 상향
                let cw = outW, ch = outH;
                if (Math.max(cw, ch) > maxDim) {
                    const scale = maxDim / Math.max(cw, ch);
                    cw *= scale; ch *= scale;
                }
                
                previewCanvasRef.current.width = cw;
                previewCanvasRef.current.height = ch;
                warper.draw(activeImage.points);
            }, [activeImage, activeImage?.points, activeImage?.color, showGrid, gridSize, mobileTab]);

            // 고해상도 이미지 처리 유틸 (다운로드용)
            const processHighResImage = (imgData) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const warper = new WebGLWarper(canvas);
                    
                    warper.setTexture(imgData.imageObj);
                    warper.setGrid(false, gridSize); 
                    
                    // 다운로드 시에도 색상 보정 적용
                    const c = imgData.color || { brightness: 0, contrast: 1, saturation: 1 };
                    warper.setColor(c.brightness, c.contrast, c.saturation);

                    const pts = imgData.points;
                    const w1 = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                    const w2 = Math.hypot(pts[3].x - pts[2].x, pts[3].y - pts[3].y);
                    const h1 = Math.hypot(pts[0].x - pts[3].x, pts[0].y - pts[3].y);
                    const h2 = Math.hypot(pts[1].x - pts[2].x, pts[1].y - pts[2].y);
                    
                    let cw = Math.max(w1, w2) * imgData.imageObj.width;
                    let ch = Math.max(h1, h2) * imgData.imageObj.height;
                    
                    const MAX_RENDER_SIZE = 4000;
                    if (Math.max(cw, ch) > MAX_RENDER_SIZE) {
                        const scale = MAX_RENDER_SIZE / Math.max(cw, ch);
                        cw *= scale; ch *= scale;
                    }
                    
                    canvas.width = cw;
                    canvas.height = ch;
                    warper.draw(imgData.points);

                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.95);
                });
            };

            const downloadSingle = async () => {
                if (!activeImage) return;
                setIsExporting(true);
                const blob = await processHighResImage(activeImage);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                const originalName = activeImage.file.name.replace(/\.[^/.]+$/, "");
                link.download = `${originalName}_corrected.jpg`;
                link.click();
                setIsExporting(false);
            };

            const downloadZip = async () => {
                if (images.length === 0) return;
                setIsExporting(true);
                const zip = new JSZip();
                
                for (let i = 0; i < images.length; i++) {
                    const blob = await processHighResImage(images[i]);
                    const originalName = images[i].file.name.replace(/\.[^/.]+$/, "");
                    zip.file(`${originalName}_corrected.jpg`, blob);
                }
                
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'corrected_documents.zip';
                link.click();
                setIsExporting(false);
            };

            const deleteImage = (e, index) => {
                e.stopPropagation();
                setImages(prev => prev.filter((_, i) => i !== index));
                if (activeIndex >= index && activeIndex > 0) setActiveIndex(activeIndex - 1);
            };

            const getTransformedPoint = (p) => {
                const { container, image } = layoutRects;
                if (!container || !image || !activeImage) return { x: p.x * 100, y: p.y * 100 };

                const offsetLeft = (image.left - container.left) / container.width;
                const offsetTop = (image.top - container.top) / container.height;
                const scaleX = image.width / container.width;
                const scaleY = image.height / container.height;

                return {
                    x: (offsetLeft + p.x * scaleX) * 100,
                    y: (offsetTop + p.y * scaleY) * 100
                };
            };

            const getSvgPolygonPoints = () => {
                if (!activeImage || !layoutRects.image) return "";
                return activeImage.points.map(p => {
                    const tp = getTransformedPoint(p);
                    return `${tp.x},${tp.y}`;
                }).join(' ');
            };

            return (
                <div className="flex flex-col md:flex-row h-[100dvh] bg-slate-950 text-slate-200 overflow-hidden"
                     onDragEnter={handleDragEnter}
                     onDragLeave={handleDragLeave}
                     onDragOver={handleDragOver}
                     onDrop={handleDrop}>
                     
                    {/* 전체 화면 드래그 오버레이 (드래그 중일 때만 표시) */}
                    {isDragOver && (
                        <div className="fixed inset-0 z-[200] bg-blue-500/10 border-[6px] border-blue-500 border-dashed m-2 md:m-4 rounded-xl flex flex-col items-center justify-center pointer-events-none backdrop-blur-[2px] transition-all">
                            <div className="bg-slate-900/90 text-blue-400 p-6 md:p-10 rounded-2xl shadow-2xl flex flex-col items-center gap-3 md:gap-4 animate-bounce">
                                <IconUpload />
                                <span className="text-lg md:text-2xl font-bold">이미지를 여기에 놓으세요!</span>
                            </div>
                        </div>
                    )}
                    
                    {/* 모바일 전용 헤더 (탭 스위치) */}
                    <div className="md:hidden flex items-center justify-between p-3 bg-slate-900 border-b border-slate-800 z-30 shrink-0">
                        <div className="flex items-center gap-2 text-white">
                            <IconArchive /> <span className="font-bold text-sm">문서 보정기 by KYUN</span>
                        </div>
                        <div className="flex bg-slate-950 rounded-lg p-1 border border-slate-800">
                            <button onClick={() => setMobileTab('edit')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${mobileTab === 'edit' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                편집
                            </button>
                            <button onClick={() => setMobileTab('preview')} className={`px-3 py-1.5 text-xs font-medium rounded-md transition-colors ${mobileTab === 'preview' ? 'bg-blue-600 text-white' : 'text-slate-400'}`}>
                                미리보기
                            </button>
                        </div>
                    </div>

                    {/* 왼쪽 작업창: 파일 목록 & 색상 보정 툴바 */}
                    <div className="
                        md:w-64 md:h-full md:flex-col md:border-r md:border-t-0 md:order-1
                        w-full h-auto flex-row py-2 px-3 border-t border-slate-800 order-3
                        bg-slate-900 z-20 shadow-xl flex gap-3 shrink-0
                    ">
                        {/* 데스크탑 전용 상단 타이틀 & 색상 보정 툴바 */}
                        <div className="hidden md:flex flex-col gap-4 p-2 pb-5 border-b border-slate-800">
                            <div className="flex items-center gap-2 text-white mb-2">
                                <IconArchive /> <span className="font-bold">문서 보정기 by KYUN</span>
                            </div>
                            <h3 className="text-sm font-semibold text-slate-300 flex items-center gap-1.5"><IconSliders/> 색상 보정</h3>
                            <ColorAdjustmentPanel activeImage={activeImage} handleColorChange={handleColorChange} />
                        </div>

                        {/* 모바일 전용: 색상 보정 패널 열기 버튼 */}
                        <button onClick={() => setShowMobileColorPanel(true)} className="md:hidden w-16 h-16 shrink-0 border-2 border-slate-700 bg-slate-800 rounded-lg flex flex-col items-center justify-center text-slate-300 hover:bg-slate-700 transition-colors">
                            <IconSliders />
                            <span className="text-[10px] mt-1 font-medium">보정옵션</span>
                        </button>
                        
                        <label 
                            className={`w-16 h-16 md:w-full md:h-16 shrink-0 border-2 border-dashed rounded-lg cursor-pointer transition-colors flex items-center justify-center gap-2 ${isDragOver ? 'border-blue-500 bg-blue-500/20 text-blue-400' : 'border-slate-700 bg-slate-800/50 hover:bg-slate-800 text-slate-400'}`}
                            title="이미지 업로드">
                            <IconUpload />
                            <span className="hidden md:block text-sm">이미지 추가...</span>
                            <input type="file" className="hidden" multiple accept="image/*" onChange={(e) => handleFiles(e.target.files)} />
                        </label>

                        {/* 썸네일 리스트 */}
                        <div className="flex-1 overflow-x-auto md:overflow-y-auto w-full flex md:flex-col flex-row items-center md:items-stretch gap-3 no-scrollbar custom-scrollbar pr-1">
                            {images.map((img, idx) => (
                                <div key={img.id} onClick={() => { setActiveIndex(idx); setMobileTab('edit'); }}
                                     className={`relative group w-16 h-16 md:w-full md:h-20 shrink-0 rounded-lg cursor-pointer transition-all overflow-hidden border-2 ${activeIndex === idx ? 'border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]' : 'border-transparent hover:border-slate-700'}`}>
                                    <div className="w-full h-full bg-slate-800 bg-cover bg-center" style={{ backgroundImage: `url(${img.url})` }} />
                                    <button onClick={(e) => deleteImage(e, idx)} className="absolute top-0 right-0 p-1.5 bg-slate-900/80 text-slate-400 hover:text-red-400 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity rounded-bl-md">
                                        <IconTrash />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 중앙 편집 영역 */}
                    <div className={`
                        flex-1 relative flex-col border-slate-800 overflow-hidden order-1 md:order-2 md:border-r
                        ${mobileTab === 'edit' ? 'flex' : 'hidden md:flex'}
                    `}>
                        {activeImage ? (
                            <div className={`flex-1 relative checkerboard flex items-center justify-center overflow-hidden touch-action-none p-2 md:p-4 ${isEditPanning ? 'cursor-grabbing' : 'cursor-grab'}`}
                                 onPointerDown={handleEditPanDown}
                                 onPointerMove={handleEditPanMove}
                                 onPointerUp={handleEditPanUp}
                                 onPointerCancel={handleEditPanUp}
                                 onWheel={handleEditWheel}>
                                
                                <div className="absolute top-3 left-3 md:top-4 md:left-4 flex flex-col items-start gap-2 z-30 pointer-events-none">
                                    <div className="text-[10px] md:text-xs bg-slate-900/90 px-2 py-1 md:px-3 md:py-1.5 rounded text-slate-300 shadow border border-slate-700">
                                        4개의 모서리를 드래그하여 영역을 맞추세요. (빈 공간 드래그로 화면 이동)
                                    </div>
                                    <div className="flex items-center gap-2 bg-slate-900/90 px-2 py-1 md:px-3 md:py-1.5 rounded text-slate-300 shadow border border-slate-700 pointer-events-auto"
                                         onPointerDown={(e) => e.stopPropagation()}
                                         onWheel={(e) => e.stopPropagation()}>
                                        <span className="text-[10px] md:text-xs font-medium whitespace-nowrap shrink-0">줌 {Math.round(zoomLevel * 100)}%</span>
                                        <input type="range" min="0.5" max="10" step="0.1" value={zoomLevel} onChange={(e) => setZoomLevel(parseFloat(e.target.value))} className="w-16 md:w-24" />
                                        <button onClick={resetEditView} className="p-1 hover:bg-slate-700 rounded text-slate-400 hover:text-white transition-colors shrink-0" title="화면 중앙 맞춤">
                                            <IconLocate />
                                        </button>
                                        <div className="w-px h-4 bg-slate-700 mx-1 shrink-0"></div>
                                        <label className="flex items-center gap-1 cursor-pointer select-none shrink-0" title="돋보기 켜기/끄기">
                                            <input type="checkbox" checked={showLoupe} onChange={(e) => setShowLoupe(e.target.checked)} className="accent-blue-500 cursor-pointer shrink-0" />
                                            <span className="text-[10px] md:text-xs font-medium whitespace-nowrap">돋보기</span>
                                        </label>
                                    </div>
                                </div>
                                
                                <div ref={imageContainerRef} className="relative shadow-2xl select-none w-full h-full max-w-full max-h-full flex items-center justify-center origin-center" 
                                     style={{ touchAction: 'none', transform: `translate(${editPan.x}px, ${editPan.y}px) scale(${zoomLevel})` }}>
                                    <img ref={imageRef} src={activeImage.url} alt="Workspace" className="max-w-full max-h-full object-contain pointer-events-none rounded block" />
                                    
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                                        {/* 가이드라인 두께도 줌에 비례하여 얇게 유지 */}
                                        <polygon points={getSvgPolygonPoints()} className="fill-blue-500/10 stroke-blue-500" style={{ strokeWidth: 0.3 / zoomLevel }} />
                                    </svg>
                                    
                                    {activeImage.points.map((p, i) => {
                                        const tp = getTransformedPoint(p);
                                        return (
                                            /* 포인터 래퍼: 역스케일링 적용 (1 / zoomLevel) */
                                            <div key={i}
                                                 className="absolute z-20"
                                                 style={{ 
                                                     left: `${tp.x}%`, 
                                                     top: `${tp.y}%`, 
                                                     width: 0, 
                                                     height: 0, 
                                                     transform: `scale(${1 / zoomLevel})` 
                                                 }}>
                                                 <div className={`absolute -left-5 -top-5 md:-left-4 md:-top-4 w-10 h-10 md:w-8 md:h-8 bg-white/90 backdrop-blur border-[3px] border-blue-500 rounded-full cursor-grab active:cursor-grabbing shadow-xl flex items-center justify-center hover:scale-110 transition-transform ${draggingPoint === i ? 'scale-125 bg-blue-100' : ''}`}
                                                      onPointerDown={(e) => handlePointerDown(e, i)}
                                                      onPointerMove={handlePointerMove}
                                                      onPointerUp={handlePointerUp}
                                                      onPointerCancel={handlePointerUp}>
                                                      <div className="w-1.5 h-1.5 bg-blue-500 rounded-full pointer-events-none"></div>
                                                 </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {/* 돋보기 UI */}
                                {showLoupe && draggingPoint !== null && (
                                    <div className="fixed rounded-full border-4 border-slate-700 bg-slate-900 overflow-hidden pointer-events-none z-50 shadow-[0_0_30px_rgba(0,0,0,0.8)]"
                                         style={{
                                             width: 140, height: 140,
                                             left: Math.max(10, Math.min(window.innerWidth - 150, mousePos.x - 70)), 
                                             top: Math.max(10, mousePos.y - 170),
                                         }}>
                                         <div style={{
                                             width: '100%', height: '100%',
                                             backgroundImage: `url(${activeImage.url})`,
                                             backgroundSize: `${activeImage.imageObj.width * 2}px ${activeImage.imageObj.height * 2}px`,
                                             backgroundPosition: `${70 - activeImage.points[draggingPoint].x * activeImage.imageObj.width * 2}px ${70 - activeImage.points[draggingPoint].y * activeImage.imageObj.height * 2}px`,
                                             backgroundRepeat: 'no-repeat'
                                         }} />
                                         <div className="absolute top-1/2 left-1/2 w-8 h-8 -mt-4 -ml-4 border border-green-400/70 rounded-full" />
                                         <div className="absolute top-1/2 left-1/2 w-1 h-1 -mt-[2px] -ml-[2px] bg-green-400 rounded-full" />
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className={`flex-1 flex flex-col items-center justify-center p-4 text-center transition-colors ${isDragOver ? 'text-blue-400' : 'text-slate-500'}`}>
                                <div className={`w-16 h-16 mb-4 rounded-full flex items-center justify-center transition-colors ${isDragOver ? 'bg-blue-900 border border-blue-500' : 'bg-slate-800'}`}>
                                    <IconUpload />
                                </div>
                                <p className="text-sm md:text-lg">{isDragOver ? '마우스를 놓으세요!' : '좌측 또는 하단에서 이미지를 추가해주세요.'}</p>
                            </div>
                        )}
                    </div>

                    {/* 오른쪽: 미리보기 및 옵션 */}
                    <div className={`
                        flex-1 md:max-w-[450px] bg-slate-900 flex-col z-20 shadow-2xl order-2 md:order-3
                        ${mobileTab === 'preview' ? 'flex' : 'hidden md:flex'}
                    `}>
                        {/* 상단 컨트롤 바 */}
                        <div className="p-3 border-b border-slate-800 flex flex-col gap-3 shrink-0 bg-slate-900 z-10 relative">
                            <div className="flex items-center justify-between">
                                <h2 className="hidden md:block font-semibold text-slate-200">실시간 미리보기</h2>
                                <h2 className="md:hidden font-semibold text-slate-200">보정 결과</h2>
                                
                                {/* 미리보기 줌(Zoom) 기능 */}
                                <div className="flex items-center gap-2 bg-slate-800 px-2 py-1.5 rounded-lg border border-slate-700" onPointerDown={(e) => e.stopPropagation()}>
                                    <IconZoomIn />
                                    <input type="range" min="1" max="10" step="0.1" value={previewZoomLevel} onChange={(e) => setPreviewZoomLevel(parseFloat(e.target.value))} className="w-16 md:w-20" title="결과물 줌" />
                                    <span className="text-[10px] text-slate-400 w-8 text-right font-mono">{Math.round(previewZoomLevel * 100)}%</span>
                                    <div className="w-px h-4 bg-slate-700 mx-1"></div>
                                    <button onClick={resetPreviewView} className="p-1 hover:bg-slate-600 rounded text-slate-400 hover:text-white transition-colors" title="화면 중앙 맞춤">
                                        <IconLocate />
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center justify-between gap-2">
                                {/* 격자 토글 */}
                                <div className="flex items-center gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700 w-auto">
                                    <label className="relative flex items-center cursor-pointer gap-1.5 px-1">
                                        <IconGrid />
                                        <input type="checkbox" className="sr-only peer" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />
                                        <div className="w-8 h-4 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:left-[24px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-blue-600"></div>
                                    </label>
                                    {showGrid && (
                                        <input type="range" min="0.05" max="0.25" step="0.01" value={gridSize} onChange={(e) => setGridSize(parseFloat(e.target.value))} className="w-12 md:w-16 mr-1" title="격자 간격" />
                                    )}
                                </div>
                                
                                {/* 저장 버튼 */}
                                <div className="flex gap-2">
                                    <button onClick={downloadSingle} disabled={!activeImage || isExporting} 
                                            className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-1.5 rounded-lg font-medium transition-colors text-xs md:text-sm">
                                        <IconDownload /> 
                                        <span className="hidden sm:flex flex-col items-start leading-[1.1] text-left">
                                            <span>단일</span>
                                            <span>저장</span>
                                        </span>
                                    </button>
                                    <button onClick={downloadZip} disabled={images.length === 0 || isExporting}
                                            className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-1.5 rounded-lg font-medium shadow-lg shadow-blue-900/50 transition-all active:scale-[0.98] text-xs md:text-sm">
                                        <IconArchive /> 
                                        <span className="flex flex-col items-start leading-[1.1] text-left">
                                            <span>전체</span>
                                            <span>저장</span>
                                        </span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        {/* 미리보기 캔버스 영역 (줌 기능 적용) */}
                        <div className="flex-1 p-3 flex flex-col overflow-hidden bg-slate-950">
                            <div className={`w-full h-full rounded-lg border border-slate-800 overflow-hidden checkerboard relative select-none touch-action-none ${isPreviewPanning ? 'cursor-grabbing' : 'cursor-grab'}`}
                                 onPointerDown={handlePreviewPanDown}
                                 onPointerMove={handlePreviewPanMove}
                                 onPointerUp={handlePreviewPanUp}
                                 onPointerCancel={handlePreviewPanUp}
                                 onWheel={handlePreviewWheel}>
                                <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                    {activeImage ? (
                                        <canvas ref={previewCanvasRef} 
                                            style={{ 
                                                transform: `translate(${previewPan.x}px, ${previewPan.y}px) scale(${previewZoomLevel})`,
                                                touchAction: 'none'
                                            }} 
                                            className="shadow-lg max-w-full max-h-full object-contain" />
                                    ) : (
                                        <span className="text-sm text-slate-600">선택된 이미지 없음</span>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 모바일용 색상 보정 바텀 시트 */}
                    {showMobileColorPanel && (
                        <div className="md:hidden fixed inset-0 z-[60] flex items-end justify-center bg-black/60 backdrop-blur-sm" onClick={() => setShowMobileColorPanel(false)}>
                            <div className="w-full bg-slate-900 rounded-t-2xl p-5 border-t border-slate-700 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] pb-10 transform transition-transform" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-semibold text-white flex items-center gap-2"><IconSliders/> 색상 상세 보정</h3>
                                    <button onClick={() => setShowMobileColorPanel(false)} className="p-1.5 bg-slate-800 rounded-lg text-slate-400 hover:text-white">닫기</button>
                                </div>
                                <ColorAdjustmentPanel activeImage={activeImage} handleColorChange={handleColorChange} />
                            </div>
                        </div>
                    )}

                    {/* 로딩 오버레이 */}
                    {isExporting && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-4 text-white font-medium text-sm">고해상도 이미지 처리 중...</p>
                        </div>
                    )}
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
