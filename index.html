<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서 보정 에디터 by KYUN</title>
    <!-- 스타일 및 폰트 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- React 및 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #0f172a; }
        .checkerboard {
            background-color: #1e293b;
            background-image: linear-gradient(45deg, #0f172a 25%, transparent 25%, transparent 75%, #0f172a 75%, #0f172a),
                              linear-gradient(45deg, #0f172a 25%, transparent 25%, transparent 75%, #0f172a 75%, #0f172a);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        .touch-action-none { touch-action: none; }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        /* 슬라이더 커스텀 */
        input[type="range"] {
            -webkit-appearance: none;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            transition: background .15s ease-in-out;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- [핵심 수학 알고리즘: 가우스 소거법을 이용한 선형 연립 방정식 풀이] ---
        function solveGaussian(A, b) {
            const n = b.length;
            for (let i = 0; i < n; i++) {
                let maxEl = Math.abs(A[i][i]), maxRow = i;
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > maxEl) {
                        maxEl = Math.abs(A[k][i]);
                        maxRow = k;
                    }
                }
                [A[maxRow], A[i]] = [A[i], A[maxRow]];
                [b[maxRow], b[i]] = [b[i], b[maxRow]];

                for (let k = i + 1; k < n; k++) {
                    let c = -A[k][i] / A[i][i];
                    for (let j = i; j < n; j++) {
                        if (i === j) A[k][j] = 0;
                        else A[k][j] += c * A[i][j];
                    }
                    b[k] += c * b[i];
                }
            }
            let x = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                x[i] = b[i] / A[i][i];
                for (let k = i - 1; k >= 0; k--) b[k] -= A[k][i] * x[i];
            }
            return x;
        }

        // 목적지(직사각형)에서 출발지(왜곡된 4점)로의 Homography 매트릭스 계산
        function getHomography(src, dst) {
            let A = [], b = [];
            for (let i = 0; i < 4; i++) {
                let x = src[i].x, y = src[i].y;
                let u = dst[i].x, v = dst[i].y;
                A.push([x, y, 1, 0, 0, 0, -u*x, -u*y]); b.push(u);
                A.push([0, 0, 0, x, y, 1, -v*x, -v*y]); b.push(v);
            }
            let h = solveGaussian(A, b);
            // WebGL은 Column-major 행렬을 사용하므로 변환하여 반환
            return [ h[0], h[3], h[6], h[1], h[4], h[7], h[2], h[5], 1.0 ];
        }

        // --- [핵심 WebGL 렌더러: 이미지 텍스처를 왜곡 보정하여 그리는 클래스] ---
        class WebGLWarper {
            constructor(canvas) {
                this.canvas = canvas;
                this.gl = canvas.getContext('webgl', { preserveDrawingBuffer: true });
                this.texture = this.gl.createTexture();
                this.initShaders();
            }

            initShaders() {
                const gl = this.gl;
                const vsSource = `
                    attribute vec2 a_position;
                    varying vec2 v_dstUV;
                    void main() {
                        // 정점 좌표를 [0, 1] 범위의 UV 좌표로 변환 (Y축 반전)
                        v_dstUV = vec2(a_position.x * 0.5 + 0.5, -a_position.y * 0.5 + 0.5);
                        gl_Position = vec4(a_position, 0, 1);
                    }
                `;
                const fsSource = `
                    precision highp float;
                    varying vec2 v_dstUV;
                    uniform sampler2D u_image;
                    uniform mat3 u_H;
                    // 격자 관련 uniform 추가
                    uniform bool u_showGrid;
                    uniform float u_gridSize;

                    void main() {
                        // 호모그래피 행렬을 사용하여 소스 이미지의 좌표 계산
                        vec3 srcP = u_H * vec3(v_dstUV, 1.0);
                        vec2 srcUV = srcP.xy / srcP.z;
                        
                        vec4 color;

                        // 범위 밖일 경우 투명 처리
                        if (srcUV.x < 0.0 || srcUV.x > 1.0 || srcUV.y < 0.0 || srcUV.y > 1.0) {
                            color = vec4(0.0, 0.0, 0.0, 0.0);
                        } else {
                            // Y축을 다시 반전시키지 않고 그대로 샘플링
                            color = texture2D(u_image, srcUV);
                        }

                        // 격자 그리기
                        if (u_showGrid) {
                            float thickness = 0.005; // 격자선 두께
                            // v_dstUV는 [0, 1] 범위이므로 격자 크기로 나누어 나머지 계산
                            float gridX = mod(v_dstUV.x, u_gridSize);
                            float gridY = mod(v_dstUV.y, u_gridSize);
                            
                            if (gridX < thickness || gridY < thickness) {
                                // 격자선 색상 (반투명 흰색)
                                color = mix(color, vec4(1.0, 1.0, 1.0, 1.0), 0.3);
                            }
                        }

                        gl_FragColor = color;
                    }
                `;
                const compile = (type, src) => {
                    const shader = gl.createShader(type);
                    gl.shaderSource(shader, src);
                    gl.compileShader(shader);
                    return shader;
                };
                const program = gl.createProgram();
                gl.attachShader(program, compile(gl.VERTEX_SHADER, vsSource));
                gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fsSource));
                gl.linkProgram(program);
                gl.useProgram(program);

                const buffer = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,  1,-1,  -1,1,  1,1]), gl.STATIC_DRAW);
                
                const posLocation = gl.getAttribLocation(program, 'a_position');
                gl.enableVertexAttribArray(posLocation);
                gl.vertexAttribPointer(posLocation, 2, gl.FLOAT, false, 0, 0);

                this.program = program;
                this.uMatrixLocation = gl.getUniformLocation(program, 'u_H');
                // 격자 관련 uniform 위치 저장
                this.uShowGridLocation = gl.getUniformLocation(program, 'u_showGrid');
                this.uGridSizeLocation = gl.getUniformLocation(program, 'u_gridSize');
            }

            setTexture(imageObj) {
                const gl = this.gl;
                gl.bindTexture(gl.TEXTURE_2D, this.texture);
                gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imageObj);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
                gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }

            // 격자 설정 메서드 추가
            setGrid(showGrid, gridSize) {
                const gl = this.gl;
                gl.uniform1i(this.uShowGridLocation, showGrid ? 1 : 0);
                gl.uniform1f(this.uGridSizeLocation, gridSize);
            }

            draw(points) {
                const gl = this.gl;
                gl.viewport(0, 0, this.canvas.width, this.canvas.height);
                gl.clearColor(0, 0, 0, 0);
                gl.clear(gl.COLOR_BUFFER_BIT);

                // 완벽한 직사각형 좌표
                const rectPoints = [ {x:0, y:0}, {x:1, y:0}, {x:1, y:1}, {x:0, y:1} ];
                const matrix = getHomography(rectPoints, points);
                
                gl.uniformMatrix3fv(this.uMatrixLocation, false, matrix);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            }
        }

        // --- [SVG 아이콘 컴포넌트들] ---
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconArchive = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" x2="14" y1="12" y2="12"/></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>;
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
        const IconGrid = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>;

        // --- [React 메인 어플리케이션] ---
        const App = () => {
            const [images, setImages] = useState([]);
            const [activeIndex, setActiveIndex] = useState(0);
            
            // 드래그 조작 관련 State
            const [draggingPoint, setDraggingPoint] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [zoomLevel, setZoomLevel] = useState(1); // 편집 영역 줌 레벨 (1 = 100%)
            
            const imageContainerRef = useRef(null);
            const previewCanvasRef = useRef(null);
            const previewWarperRef = useRef(null);
            const [isExporting, setIsExporting] = useState(false);

            // 격자 관련 상태 추가
            const [showGrid, setShowGrid] = useState(true);
            const [gridSize, setGridSize] = useState(0.1); // 0.05 ~ 0.25 범위

            const activeImage = images[activeIndex];

            // 파일 처리기
            const handleFiles = (fileList) => {
                Array.from(fileList).forEach((file, index) => {
                    if (!file.type.startsWith('image/')) return;
                    const url = URL.createObjectURL(file);
                    const img = new Image();
                    img.onload = () => {
                        setImages(prev => {
                            const isFirst = prev.length === 0;
                            return [...prev, {
                                id: Math.random().toString(36).substring(2, 9),
                                file, url, imageObj: img,
                                points: [
                                    {x: 0.1, y: 0.1}, {x: 0.9, y: 0.1}, 
                                    {x: 0.9, y: 0.9}, {x: 0.1, y: 0.9}
                                ]
                            }];
                        });
                    };
                    img.src = url;
                });
            };

            const onDrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
            const onDragOver = (e) => e.preventDefault();

            // 점 드래그 핸들러
            const handlePointerDown = (e, idx) => {
                e.target.setPointerCapture(e.pointerId);
                setDraggingPoint(idx);
                setMousePos({ x: e.clientX, y: e.clientY });
            };

            const handlePointerMove = (e) => {
                if (draggingPoint === null || !imageContainerRef.current) return;
                setMousePos({ x: e.clientX, y: e.clientY });
                
                const rect = imageContainerRef.current.getBoundingClientRect();
                // 줌 레벨을 고려하여 실제 이미지 영역에서의 상대 좌표 계산
                const nx = (e.clientX - rect.left) / rect.width;
                const ny = (e.clientY - rect.top) / rect.height;

                setImages(prev => {
                    const newImages = [...prev];
                    const active = { ...newImages[activeIndex] };
                    const newPoints = [...active.points];
                    newPoints[draggingPoint] = { x: nx, y: ny };
                    active.points = newPoints;
                    newImages[activeIndex] = active;
                    return newImages;
                });
            };

            const handlePointerUp = (e) => {
                if (draggingPoint !== null) {
                    e.target.releasePointerCapture(e.pointerId);
                    setDraggingPoint(null);
                }
            };

            // 실시간 미리보기 WebGL 업데이트
            useEffect(() => {
                if (!previewCanvasRef.current || !activeImage) return;
                if (!previewWarperRef.current) {
                    previewWarperRef.current = new WebGLWarper(previewCanvasRef.current);
                }
                const warper = previewWarperRef.current;
                warper.setTexture(activeImage.imageObj);
                // 격자 설정 적용 (초기화 시)
                warper.setGrid(showGrid, gridSize);

                const pts = activeImage.points;
                const w1 = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                const w2 = Math.hypot(pts[3].x - pts[2].x, pts[3].y - pts[3].y);
                const h1 = Math.hypot(pts[0].x - pts[3].x, pts[0].y - pts[3].y);
                const h2 = Math.hypot(pts[1].x - pts[2].x, pts[1].y - pts[2].y);
                
                const outW = Math.max(w1, w2) * activeImage.imageObj.width;
                const outH = Math.max(h1, h2) * activeImage.imageObj.height;
                
                // 미리보기 성능을 위해 해상도 제한 (최대 600px)
                const maxDim = 600;
                let cw = outW, ch = outH;
                if (Math.max(cw, ch) > maxDim) {
                    const scale = maxDim / Math.max(cw, ch);
                    cw *= scale; ch *= scale;
                }
                
                previewCanvasRef.current.width = cw;
                previewCanvasRef.current.height = ch;
                
                warper.draw(activeImage.points);
            }, [activeImage, activeImage?.points, showGrid, gridSize]);

            // 격자 설정 변경 시 실시간 업데이트를 위한 useEffect 추가
            useEffect(() => {
                if (!previewWarperRef.current || !activeImage) return;
                const warper = previewWarperRef.current;
                warper.setGrid(showGrid, gridSize);
                warper.draw(activeImage.points);
            }, [showGrid, gridSize, activeImage]);

            // 고해상도 이미지 처리 유틸 (다운로드용)
            const processHighResImage = (imgData) => {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    const warper = new WebGLWarper(canvas);
                    warper.setTexture(imgData.imageObj);
                    // 다운로드용 이미지에는 격자를 그리지 않음
                    warper.setGrid(false, gridSize);

                    const pts = imgData.points;
                    const w1 = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
                    const w2 = Math.hypot(pts[3].x - pts[2].x, pts[3].y - pts[3].y);
                    const h1 = Math.hypot(pts[0].x - pts[3].x, pts[0].y - pts[3].y);
                    const h2 = Math.hypot(pts[1].x - pts[2].x, pts[1].y - pts[2].y);
                    
                    let cw = Math.max(w1, w2) * imgData.imageObj.width;
                    let ch = Math.max(h1, h2) * imgData.imageObj.height;
                    
                    // 메모리 부족 방지: 최대 4000 픽셀로 제한
                    const MAX_RENDER_SIZE = 4000;
                    if (Math.max(cw, ch) > MAX_RENDER_SIZE) {
                        const scale = MAX_RENDER_SIZE / Math.max(cw, ch);
                        cw *= scale; ch *= scale;
                    }
                    
                    canvas.width = cw;
                    canvas.height = ch;
                    warper.draw(imgData.points);

                    canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.95);
                });
            };

            const downloadSingle = async () => {
                if (!activeImage) return;
                setIsExporting(true);
                const blob = await processHighResImage(activeImage);
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                const originalName = activeImage.file.name.replace(/\.[^/.]+$/, "");
                link.download = `${originalName}_corrected.jpg`;
                link.click();
                setIsExporting(false);
            };

            const downloadZip = async () => {
                if (images.length === 0) return;
                setIsExporting(true);
                const zip = new JSZip();
                
                for (let i = 0; i < images.length; i++) {
                    const blob = await processHighResImage(images[i]);
                    const originalName = images[i].file.name.replace(/\.[^/.]+$/, "");
                    zip.file(`${originalName}_corrected.jpg`, blob);
                }
                
                const content = await zip.generateAsync({ type: 'blob' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = 'corrected_documents.zip';
                link.click();
                setIsExporting(false);
            };

            const deleteImage = (e, index) => {
                e.stopPropagation();
                setImages(prev => prev.filter((_, i) => i !== index));
                if (activeIndex >= index && activeIndex > 0) setActiveIndex(activeIndex - 1);
            };

            // SVG Polygon 라인 그리기
            const getSvgPolygonPoints = () => {
                if (!activeImage) return "";
                return activeImage.points.map(p => `${p.x * 100},${p.y * 100}`).join(' ');
            };

            return (
                <div className="flex h-screen bg-slate-950 text-slate-200">
                    {/* 왼쪽 사이드바: 파일 목록 (너비 축소 및 아이콘화) */}
                    <div className="w-24 bg-slate-900 border-r border-slate-800 flex flex-col z-20 shadow-xl items-center py-4 gap-4">
                        <div className="w-10 h-10 rounded bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-900/50">
                            <IconArchive />
                        </div>
                        
                        <label 
                            onDrop={onDrop}
                            onDragOver={onDragOver}
                            className="w-16 h-16 border-2 border-slate-700 border-dashed rounded-lg cursor-pointer bg-slate-800/50 hover:bg-slate-800 transition-colors flex items-center justify-center"
                            title="이미지 업로드">
                            <IconUpload />
                            <input type="file" className="hidden" multiple accept="image/*" onChange={(e) => handleFiles(e.target.files)} />
                        </label>

                        <div className="flex-1 overflow-y-auto w-full px-2 space-y-2 flex flex-col items-center no-scrollbar">
                            {images.map((img, idx) => (
                                <div key={img.id} onClick={() => setActiveIndex(idx)}
                                     className={`relative group w-16 h-16 rounded-lg cursor-pointer transition-all overflow-hidden border-2 ${activeIndex === idx ? 'border-blue-500' : 'border-transparent hover:border-slate-700'}`}>
                                    <div className="w-full h-full bg-slate-800 bg-cover bg-center" style={{ backgroundImage: `url(${img.url})` }} />
                                    <button onClick={(e) => deleteImage(e, idx)} className="absolute top-0 right-0 p-1 bg-slate-900/80 text-slate-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity rounded-bl-md">
                                        <IconTrash size={14} />
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 중앙 메인 영역 (편집 및 미리보기 1:1 분할) */}
                    <div className="flex-1 flex" onDrop={onDrop} onDragOver={onDragOver}>
                        {/* 왼쪽: 편집 화면 */}
                        <div className="flex-1 relative flex flex-col border-r border-slate-800 overflow-hidden">
                            {activeImage ? (
                                <div className="flex-1 relative checkerboard flex items-center justify-center overflow-hidden touch-action-none p-4">
                                    {/* 줌 슬라이더 및 안내 문구 */}
                                    <div className="absolute top-4 left-4 flex items-center gap-4 z-30 pointer-events-auto">
                                        <div className="text-xs bg-slate-900/80 px-3 py-1.5 rounded-md text-slate-300 font-medium shadow border border-slate-700 pointer-events-none">
                                            4개의 모서리를 드래그하여 영역 지정
                                        </div>
                                        <div className="flex items-center gap-2 bg-slate-900/80 px-3 py-1.5 rounded-md text-slate-300 font-medium shadow border border-slate-700 pointer-events-auto">
                                            <span className="text-xs">확대: {Math.round(zoomLevel * 100)}%</span>
                                            <input type="range" min="0.5" max="3" step="0.1" value={zoomLevel} onChange={(e) => setZoomLevel(parseFloat(e.target.value))} className="w-24" title="줌 레벨 조절" />
                                        </div>
                                    </div>
                                    
                                    {/* 이미지와 보정 레이어를 감싸는 컨테이너. 화면을 최대한 채우도록 수정. 줌 레벨 적용 */}
                                    <div ref={imageContainerRef} className="relative shadow-2xl select-none w-full h-full max-w-full max-h-full flex items-center justify-center transition-transform origin-center" 
                                         style={{ touchAction: 'none', transform: `scale(${zoomLevel})` }}>
                                        <img src={activeImage.url} alt="Workspace" className="max-w-full max-h-full object-contain pointer-events-none rounded opacity-90 block" />
                                        
                                        {/* 점을 잇는 가이드 라인 */}
                                        <svg className="absolute inset-0 w-full h-full pointer-events-none overflow-visible z-10" viewBox="0 0 100 100" preserveAspectRatio="none">
                                            <polygon points={getSvgPolygonPoints()} className="fill-blue-500/10 stroke-blue-500 stroke-[0.3]" />
                                        </svg>
                                        
                                        {/* 4개의 드래그 가능 핸들 */}
                                        {activeImage.points.map((p, i) => (
                                            <div key={i}
                                                 className={`absolute w-8 h-8 -ml-4 -mt-4 bg-white border-[3px] border-blue-500 rounded-full cursor-grab active:cursor-grabbing shadow-xl z-20 flex items-center justify-center hover:scale-110 transition-transform ${draggingPoint === i ? 'scale-110 bg-blue-50' : ''}`}
                                                 style={{ left: `${p.x * 100}%`, top: `${p.y * 100}%` }}
                                                 onPointerDown={(e) => handlePointerDown(e, i)}
                                                 onPointerMove={handlePointerMove}
                                                 onPointerUp={handlePointerUp}
                                                 onPointerCancel={handlePointerUp}>
                                                 <div className="w-1.5 h-1.5 bg-blue-500 rounded-full pointer-events-none"></div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* 실시간 돋보기(Loupe) 기능 - 줌 레벨 고려 */}
                                    {draggingPoint !== null && (
                                        <div className="fixed rounded-full border-4 border-slate-800 bg-slate-900 overflow-hidden pointer-events-none z-50 shadow-[0_0_30px_rgba(0,0,0,0.5)]"
                                             style={{
                                                 width: 140, height: 140,
                                                 left: mousePos.x - 70, 
                                                 top: Math.max(10, mousePos.y - 180),
                                             }}>
                                             <div style={{
                                                 width: '100%', height: '100%',
                                                 backgroundImage: `url(${activeImage.url})`,
                                                 // 줌 레벨을 고려하여 배경 크기와 위치를 조정해야 하지만, 현재 구조상 복잡함.
                                                 // 돋보기는 원본 이미지 기준 확대로 유지하고, 드래그는 줌된 화면 기준으로 작동하게 함.
                                                 backgroundSize: `${activeImage.imageObj.width * 2 * zoomLevel}px ${activeImage.imageObj.height * 2 * zoomLevel}px`,
                                                 backgroundPosition: `${70 - activeImage.points[draggingPoint].x * activeImage.imageObj.width * 2 * zoomLevel}px ${70 - activeImage.points[draggingPoint].y * activeImage.imageObj.height * 2 * zoomLevel}px`,
                                                 backgroundRepeat: 'no-repeat'
                                             }} />
                                             <div className="absolute top-1/2 left-1/2 w-8 h-8 -mt-4 -ml-4 border border-green-400/50 rounded-full" />
                                             <div className="absolute top-1/2 left-1/2 w-1.5 h-1.5 -mt-[3px] -ml-[3px] bg-green-400 rounded-full" />
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-500">
                                    <div className="w-20 h-20 mb-6 rounded-full bg-slate-800 flex items-center justify-center">
                                        <IconUpload />
                                    </div>
                                    <p className="text-lg">왼쪽에서 이미지를 추가해주세요.</p>
                                </div>
                            )}
                        </div>

                        {/* 오른쪽: 미리보기 및 옵션 화면 */}
                        <div className="flex-1 bg-slate-900 flex flex-col z-20 shadow-xl">
                            {/* 상단 옵션바 */}
                            <div className="p-4 border-b border-slate-800 flex items-center justify-between">
                                <h2 className="font-semibold text-slate-200">실시간 미리보기</h2>
                                
                                {/* 격자 설정 및 다운로드 버튼 */}
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center gap-3 bg-slate-800/50 p-2 rounded-lg border border-slate-800">
                                        <div className="flex items-center gap-2 text-sm font-medium text-slate-300">
                                            <IconGrid /> 격자
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={showGrid} onChange={(e) => setShowGrid(e.target.checked)} />
                                            <div className="w-9 h-5 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div>
                                        </label>
                                        {showGrid && (
                                            <input type="range" min="0.05" max="0.25" step="0.01" value={gridSize} onChange={(e) => setGridSize(parseFloat(e.target.value))} className="w-24" title="격자 크기 조절" />
                                        )}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={downloadSingle} disabled={!activeImage || isExporting} 
                                                className="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-2 rounded-lg font-medium transition-colors text-sm">
                                            <IconDownload /> 단일 저장
                                        </button>
                                        <button onClick={downloadZip} disabled={images.length === 0 || isExporting}
                                                className="flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white px-3 py-2 rounded-lg font-medium shadow-lg shadow-blue-900/50 transition-all active:scale-[0.98] text-sm">
                                            <IconArchive /> 전체 저장 ({images.length})
                                        </button>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 미리보기 캔버스 영역 (남은 공간 모두 차지) */}
                            <div className="flex-1 p-4 flex flex-col gap-4 overflow-hidden">
                                <div className="w-full h-full bg-slate-950 rounded-lg border border-slate-800 overflow-hidden flex items-center justify-center checkerboard">
                                    {activeImage ? (
                                        <canvas ref={previewCanvasRef} className="max-w-full max-h-full object-contain shadow-lg" />
                                    ) : (
                                        <span className="text-sm text-slate-600">선택된 이미지 없음</span>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 전체 화면 로딩 오버레이 (Export 시) */}
                    {isExporting && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center">
                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                            <p className="mt-4 text-white font-medium">고해상도 이미지 렌더링 중...</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
